<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Aziz Cells V3</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
overflow:hidden;
font-family:Segoe UI,Arial,sans-serif;
background:#0f172a;
color:white;
}

canvas{
display:block;
background:radial-gradient(circle at center,#1e293b,#0f172a);
}

/* UI */
#ui{
position:fixed;
top:15px;
left:15px;
background:rgba(0,0,0,.4);
padding:12px 14px;
border-radius:12px;
backdrop-filter:blur(10px);
}

#leaderboard{
position:fixed;
top:15px;
right:15px;
background:rgba(0,0,0,.4);
padding:12px 14px;
border-radius:12px;
min-width:180px;
backdrop-filter:blur(10px);
}

#menu{
position:fixed;
inset:0;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
background:rgba(0,0,0,.7);
backdrop-filter:blur(8px);
}

button{
padding:12px 20px;
border:none;
border-radius:10px;
background:#3b82f6;
color:white;
font-size:16px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#2563eb;
}

h1{
margin-bottom:10px;
}
</style>
</head>

<body>

<!-- MENU -->
<div id="menu">
<h1>Aziz Cells V3</h1>
<p>Eat. Grow. Survive.</p>
<button onclick="startGame()">Play</button>
</div>

<!-- UI -->
<div id="ui">
<div>Mass: <span id="mass">20</span></div>
<div>Score: <span id="score">0</span></div>
</div>

<!-- LEADERBOARD -->
<div id="leaderboard">
<h3>Leaderboard</h3>
<ol id="board"></ol>
</div>

<canvas id="game"></canvas>

<script>

// =========================
// CANVAS SETUP
// =========================
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

function resize(){
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
}
resize();
window.addEventListener("resize",resize);

// =========================
// WORLD
// =========================
const WORLD_SIZE=5000;

// =========================
// GAME STATE
// =========================
let gameStarted=false;
let score=0;

// =========================
// PLAYER
// =========================
const player={
x:WORLD_SIZE/2,
y:WORLD_SIZE/2,
r:20,
mass:20,
speed:3,
color:"#3b82f6"
};

// =========================
// INPUT
// =========================
const mouse={x:0,y:0};

window.addEventListener("mousemove",(e)=>{
mouse.x=e.clientX;
mouse.y=e.clientY;
});

// =========================
// FOOD SYSTEM
// =========================
const foods=[];

function spawnFood(n=600){
for(let i=0;i<n;i++){
foods.push({
x:Math.random()*WORLD_SIZE,
y:Math.random()*WORLD_SIZE,
r:4,
color:`hsl(${Math.random()*360},80%,60%)`
});
}
}
spawnFood();


// =========================
// START GAME
// =========================
function startGame(){
document.getElementById("menu").style.display="none";
gameStarted=true;
}

// =========================
// CAMERA
// =========================
let camX=0;
let camY=0;

// =========================
// LOOP
// =========================
function update(){

if(!gameStarted){
requestAnimationFrame(update);
return;
}

// camera follow
camX += (player.x - canvas.width/2 - camX)*0.08;
camY += (player.y - canvas.height/2 - camY)*0.08;

// movement toward mouse
const angle=Math.atan2(
mouse.y-canvas.height/2,
mouse.x-canvas.width/2
);

player.x+=Math.cos(angle)*player.speed;
player.y+=Math.sin(angle)*player.speed;

// bounds
player.x=Math.max(0,Math.min(WORLD_SIZE,player.x));
player.y=Math.max(0,Math.min(WORLD_SIZE,player.y));

// food collision
for(let i=foods.length-1;i>=0;i--){
const f=foods[i];
const d=Math.hypot(player.x-f.x,player.y-f.y);

if(d<player.r){
foods.splice(i,1);
player.mass++;
player.r+=0.12;
score++;

foods.push({
x:Math.random()*WORLD_SIZE,
y:Math.random()*WORLD_SIZE,
r:4,
color:`hsl(${Math.random()*360},80%,60%)`
});
}
}

// UI
document.getElementById("mass").textContent=Math.floor(player.mass);
document.getElementById("score").textContent=score;

draw();
requestAnimationFrame(update);
}

// =========================
// DRAW
// =========================
function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

// grid
ctx.strokeStyle="rgba(255,255,255,0.05)";
for(let x=0;x<WORLD_SIZE;x+=100){
ctx.beginPath();
ctx.moveTo(x-camX,0-camY);
ctx.lineTo(x-camX,WORLD_SIZE-camY);
ctx.stroke();
}

// food
for(const f of foods){
ctx.beginPath();
ctx.fillStyle=f.color;
ctx.arc(f.x-camX,f.y-camY,f.r,0,Math.PI*2);
ctx.fill();
}

// player
ctx.beginPath();
ctx.fillStyle=player.color;
ctx.arc(player.x-camX,player.y-camY,player.r,0,Math.PI*2);
ctx.fill();

}

// =========================
// START LOOP
// =========================
update();

</script>

</body>
</html>
