<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Aziz Cells</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
overflow:hidden;
font-family:Segoe UI,sans-serif;
background:#0f172a;
color:white;
}

canvas{
display:block;
background:
radial-gradient(circle at center,#1e293b,#0f172a);
}

#ui{
position:fixed;
top:20px;
left:20px;
background:rgba(0,0,0,.4);
padding:15px;
border-radius:15px;
backdrop-filter:blur(8px);
}

#leaderboard{
position:fixed;
top:20px;
right:20px;
background:rgba(0,0,0,.4);
padding:15px;
border-radius:15px;
min-width:180px;
backdrop-filter:blur(8px);
}

h3{
margin-bottom:10px;
}

li{
margin:4px 0;
}
</style>
</head>

<body>

<div id="ui">
<h3>Aziz Cells</h3>
<div>Mass: <span id="mass">20</span></div>
</div>

<div id="leaderboard">
<h3>Leaderboard</h3>
<ol id="board"></ol>
</div>

<canvas id="game"></canvas>

<script>

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

const worldSize=4000;

const player={
x:2000,
y:2000,
radius:20,
color:"#3b82f6",
mass:20
};

const mouse={
x:canvas.width/2,
y:canvas.height/2
};

const foods=[];

for(let i=0;i<500;i++){
foods.push({
x:Math.random()*worldSize,
y:Math.random()*worldSize,
radius:4,
color:`hsl(${Math.random()*360},80%,60%)`
});
}

const bots=[];

for(let i=0;i<15;i++){
bots.push({
name:"Bot "+(i+1),
x:Math.random()*worldSize,
y:Math.random()*worldSize,
radius:15+Math.random()*25,
color:`hsl(${Math.random()*360},80%,60%)`
});
}

window.addEventListener("mousemove",e=>{
mouse.x=e.clientX;
mouse.y=e.clientY;
});

function updatePlayer(){

const dx=mouse.x-canvas.width/2;
const dy=mouse.y-canvas.height/2;

const angle=Math.atan2(dy,dx);

const speed=Math.max(
1.2,
6-(player.radius*0.05)
);

player.x+=Math.cos(angle)*speed;
player.y+=Math.sin(angle)*speed;

player.x=Math.max(0,Math.min(worldSize,player.x));
player.y=Math.max(0,Math.min(worldSize,player.y));

for(let i=foods.length-1;i>=0;i--){

const food=foods[i];

const dist=Math.hypot(
player.x-food.x,
player.y-food.y
);

if(dist<player.radius){

foods.splice(i,1);

player.mass++;
player.radius+=0.15;

foods.push({
x:Math.random()*worldSize,
y:Math.random()*worldSize,
radius:4,
color:`hsl(${Math.random()*360},80%,60%)`
});
}
}

document.getElementById("mass").textContent=
Math.floor(player.mass);
}

function updateBots(){

bots.forEach(bot=>{

bot.x+=(-2+Math.random()*4);
bot.y+=(-2+Math.random()*4);

bot.x=Math.max(0,Math.min(worldSize,bot.x));
bot.y=Math.max(0,Math.min(worldSize,bot.y));

});
}

function drawGrid(offsetX,offsetY){

ctx.strokeStyle="rgba(255,255,255,.05)";

for(let x=0;x<worldSize;x+=100){

ctx.beginPath();
ctx.moveTo(x-offsetX,-offsetY);
ctx.lineTo(x-offsetX,worldSize-offsetY);
ctx.stroke();

}

for(let y=0;y<worldSize;y+=100){

ctx.beginPath();
ctx.moveTo(-offsetX,y-offsetY);
ctx.lineTo(worldSize-offsetX,y-offsetY);
ctx.stroke();

}
}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

const camX=
player.x-canvas.width/2;

const camY=
player.y-canvas.height/2;

drawGrid(camX,camY);

foods.forEach(food=>{

ctx.beginPath();
ctx.fillStyle=food.color;

ctx.arc(
food.x-camX,
food.y-camY,
food.radius,
0,
Math.PI*2
);

ctx.fill();

});

bots.forEach(bot=>{

ctx.beginPath();

ctx.fillStyle=bot.color;

ctx.arc(
bot.x-camX,
bot.y-camY,
bot.radius,
0,
Math.PI*2
);

ctx.fill();

ctx.fillStyle="white";
ctx.textAlign="center";

ctx.fillText(
bot.name,
bot.x-camX,
bot.y-camY-25
);

});

ctx.beginPath();

ctx.fillStyle=player.color;

ctx.arc(
player.x-camX,
player.y-camY,
player.radius,
0,
Math.PI*2
);

ctx.fill();

ctx.fillStyle="white";
ctx.textAlign="center";
ctx.font="16px Segoe UI";

ctx.fillText(
"Aziz",
canvas.width/2,
canvas.height/2-30
);

updateLeaderboard();
}

function updateLeaderboard(){

const scores=[
{
name:"Aziz",
mass:player.mass
}
];

bots.forEach(bot=>{
scores.push({
name:bot.name,
mass:bot.radius*2
});
});

scores.sort((a,b)=>b.mass-a.mass);

const board=
document.getElementById("board");

board.innerHTML="";

scores.slice(0,10).forEach(p=>{

const li=document.createElement("li");

li.textContent=
`${p.name} (${Math.floor(p.mass)})`;

board.appendChild(li);

});
}

function gameLoop(){

updatePlayer();
updateBots();
draw();

requestAnimationFrame(gameLoop);
}

gameLoop();

window.addEventListener("resize",()=>{

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

});

</script>

</body>
</html>
