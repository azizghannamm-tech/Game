<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pong - Aziz Arcade</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:#0f172a;
    font-family:Segoe UI, Arial;
    color:white;
}

#ui{
    position:fixed;
    top:10px;
    width:100%;
    text-align:center;
    z-index:10;
}

#score{
    font-size:22px;
    margin-bottom:8px;
}

button{
    padding:8px 14px;
    margin:3px;
    border:none;
    border-radius:8px;
    background:#3b82f6;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#2563eb;
}
</style>
</head>

<body>

<div id="ui">
    <div id="score">Score: 0</div>
    <button onclick="togglePause()">Pause</button>
    <button onclick="restartGame()">Restart</button>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// Resize safely
function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

// Game variables
let paddleHeight = 100;
let paddleWidth = 12;

let playerY = canvas.height / 2 - 50;
let aiY = canvas.height / 2 - 50;

let ballX = canvas.width / 2;
let ballY = canvas.height / 2;

let dx = 4;
let dy = 4;

let score = 0;
let paused = false;

// Mouse control
document.addEventListener("mousemove",(e)=>{
    playerY = e.clientY - paddleHeight/2;

    // Keep inside screen
    if(playerY < 0) playerY = 0;
    if(playerY > canvas.height - paddleHeight)
        playerY = canvas.height - paddleHeight;
});

// Draw everything
function draw(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    // Player paddle
    ctx.fillStyle = "#22c55e";
    ctx.fillRect(20, playerY, paddleWidth, paddleHeight);

    // AI paddle
    ctx.fillStyle = "#ef4444";
    ctx.fillRect(canvas.width - 30, aiY, paddleWidth, paddleHeight);

    // Ball
    ctx.beginPath();
    ctx.arc(ballX, ballY, 10, 0, Math.PI*2);
    ctx.fillStyle = "#fff";
    ctx.fill();
}

// Update game
function update(){
    if(paused) return;

    ballX += dx;
    ballY += dy;

    // Wall bounce
    if(ballY < 10 || ballY > canvas.height - 10){
        dy *= -1;
    }

    // Player hit
    if(ballX < 32){
        if(ballY > playerY && ballY < playerY + paddleHeight){
            dx *= -1;
            score++;
            document.getElementById("score").innerText =
                "Score: " + score;
        }else{
            gameOver();
        }
    }

    // AI hit
    if(ballX > canvas.width - 40){
        if(ballY > aiY && ballY < aiY + paddleHeight){
            dx *= -1;
        }else{
            dx *= -1;
        }
    }

    // Simple AI
    aiY += (ballY - (aiY + paddleHeight/2)) * 0.08;
}

// Loop (ALWAYS runs)
function loop(){
    update();
    draw();
    requestAnimationFrame(loop);
}

// Controls
function togglePause(){
    paused = !paused;
}

function restartGame(){
    score = 0;
    document.getElementById("score").innerText = "Score: 0";

    ballX = canvas.width / 2;
    ballY = canvas.height / 2;

    dx = 4;
    dy = 4;

    paused = false;
}

function gameOver(){
    paused = true;
    setTimeout(()=>{
        alert("Game Over! Score: " + score);
    },50);
}

// START GAME
loop();
</script>

</body>
</html>
