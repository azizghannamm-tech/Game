<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fullscreen Pong</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: #111;
  color: white;
  font-family: Arial, sans-serif;
}

/* UI Panel */
#ui {
  position: fixed;
  top: 10px;
  width: 100%;
  text-align: center;
}

button {
  padding: 10px 15px;
  margin: 5px;
  border: none;
  background: #00adb5;
  color: white;
  font-size: 14px;
  cursor: pointer;
  border-radius: 4px;
}

button:hover {
  background: #008b91;
}

#score {
  font-size: 22px;
  margin-bottom: 5px;
}

canvas {
  display: block;
}
</style>
</head>

<body>

<div id="ui">
  <div id="score">Score: 0</div>
  <button onclick="togglePause()">Pause</button>
  <button onclick="restartGame()">Restart</button>
</div>

<canvas id="pong"></canvas>

<script>
const canvas = document.getElementById("pong");
const ctx = canvas.getContext("2d");

// Fullscreen resize
function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

// Player paddle
let paddleY = 200;
const paddleHeight = 100;

// AI paddle
let aiY = 200;

// Ball
let ballX = 300;
let ballY = 200;
let dx = 5;
let dy = 5;

// Game state
let score = 0;
let paused = false;

// Mouse control
