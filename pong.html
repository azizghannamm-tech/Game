<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Pong</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:#020617;
    font-family:Segoe UI;
    color:white;
}

#ui{
    position:fixed;
    top:10px;
    width:100%;
    text-align:center;
}

#score{
    font-size:22px;
    margin-bottom:8px;
    text-shadow:0 0 10px #0ff;
}

button{
    padding:8px 12px;
    margin:3px;
    border:none;
    border-radius:8px;
    background:#3b82f6;
    color:white;
    cursor:pointer;
}
</style>
</head>

<body>

<div id="ui">
    <div id="score">Player: 0 | Opponent: 0</div>
    <button onclick="togglePause()">Pause</button>
    <button onclick="restartGame()">Restart</button>
    <button onclick="toggleMode()">Switch Mode</button>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

// 🎵 Background Music
const bgMusic = new Audio("https://cdn.pixabay.com/download/audio/2022/03/15/audio_115b9bce37.mp3");
bgMusic.loop = true;
bgMusic.volume = 0.2;

// try autoplay (browser may block until first interaction)
document.addEventListener("click", () => {
    if(bgMusic.paused) bgMusic.play();
});

// 🔊 Sound FX
function beep(freq){
    let ctxAudio = new (window.AudioContext || window.webkitAudioContext)();
    let osc = ctxAudio.createOscillator();
    let gain = ctxAudio.createGain();

    osc.connect(gain);
    gain.connect(ctxAudio.destination);

    osc.frequency.value = freq;
    gain.gain.value = 0.05;

    osc.start();
    osc.stop(ctxAudio.currentTime + 0.1);
}

// Game state
let playerY = 200;
let enemyY = 200;

let paddleH = 100;

let ballX = 300;
let ballY = 200;
let dx = 5;
let dy = 5;

let playerScore = 0;
let enemyScore = 0;

let paused = false;
let multiplayer = false;

// 🖱 Player mouse (always active)
document.addEventListener("mousemove", e=>{
    playerY = e.clientY - paddleH/2;
});

// 🎮 Keyboard multiplayer
document.addEventListener("keydown", e=>{
    if(multiplayer){
        if(e.key === "ArrowUp") enemyY -= 30;
        if(e.key === "ArrowDown") enemyY += 30;
    }
});

// Neon glow
function glow(color){
    ctx.shadowBlur = 20;
    ctx.shadowColor = color;
    ctx.fillStyle = color;
}

// Draw
function draw(){

    ctx.fillStyle="rgba(2,6,23,0.3)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    glow("#22c55e");
    ctx.fillRect(20, playerY, 12, paddleH);

    glow("#ef4444");
    ctx.fillRect(canvas.width-30, enemyY, 12, paddleH);

    glow("#38bdf8");
    ctx.beginPath();
    ctx.arc(ballX, ballY, 10, 0, Math.PI*2);
    ctx.fill();

    ctx.shadowBlur = 0;
}

// 🤖 AI (used only if NOT multiplayer)
function aiMove(){
    let target = ballY;

    if(dx > 0){
        let t = (canvas.width - ballX) / dx;
        target = ballY + dy*t;
    }

    enemyY += (target - (enemyY + paddleH/2)) * 0.12;
}

// Update
function update(){
    if(paused) return;

    ballX += dx;
    ballY += dy;

    // Wall
    if(ballY < 10 || ballY > canvas.height-10){
        dy *= -1;
        beep(300);
    }

    // Player collision
    if(ballX < 32){
        if(ballY > playerY && ballY < playerY + paddleH){
            dx *= -1.05;
            beep(600);
        } else {
            enemyScore++;
            resetBall();
        }
    }

    // Enemy collision
    if(ballX > canvas.width - 40){
        if(ballY > enemyY && ballY < enemyY + paddleH){
            dx *= -1.05;
            beep(500);
        } else {
            playerScore++;
            resetBall();
        }
    }

    if(!multiplayer){
        aiMove();
    }

    updateScore();
}

// Reset ball
function resetBall(){
    ballX = canvas.width/2;
    ballY = canvas.height/2;

    dx = 5 * (Math.random()>0.5?1:-1);
    dy = 5 * (Math.random()>0.5?1:-1);
}

// Score display
function updateScore(){
    document.getElementById("score").innerText =
        `Player: ${playerScore} | Opponent: ${enemyScore}`;
}

// Loop
function loop(){
    update();
    draw();
    requestAnimationFrame(loop);
}

// Controls
function togglePause(){
    paused = !paused;
}

function restartGame(){
    playerScore = 0;
    enemyScore = 0;
    resetBall();
}

function toggleMode(){
    multiplayer = !multiplayer;
    alert(multiplayer ? "Multiplayer Mode" : "AI Mode");
}

// start game
loop();
</script>

</body>
</html>
