<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Runner Pro</title>

<style>
body{
    margin:0;
    background:#020617;
    color:white;
    font-family:sans-serif;
    overflow:hidden;
}

#ui{
    position:absolute;
    top:10px;
    left:10px;
}

button{
    margin-top:5px;
    padding:6px 12px;
    border:none;
    border-radius:6px;
    background:#3b82f6;
    color:white;
    cursor:pointer;
}

canvas{ display:block; margin:auto; }
</style>
</head>

<body>

<div id="ui">
    <div id="score">Score: 0</div>
    <div id="coins">Coins: 0</div>
    <button onclick="togglePause()">Pause</button>
    <button onclick="restartGame()">Restart</button>
</div>

<canvas id="game" width="400" height="600"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let lanes = 4;

let player, cars, coinsList, speed, score, coins;
let gameOver=false, paused=false;
let roadOffset=0;
let shake = 0;

// init
function init(){
    player = { lane:1, x:0, targetX:0 };
    cars=[];
    coinsList=[];
    speed=5;
    score=0;
    coins=0;
    gameOver=false;
    roadOffset=0;
}

// 🔥 ADVANCED RANDOM SPAWN
function spawnRow(){

    if(cars.length === 0){
        cars.push({lane:0,y:-100});
        cars.push({lane:2,y:-100});
        cars.push({lane:3,y:-100});
        coinsList.push({lane:1,y:-120,spin:0});
        return;
    }

    let highest = Math.min(...cars.map(c=>c.y));
    if(highest > -260) return;

    let laneArray = [0,1,2,3];

    // ✅ choose 2 or 3 blocked lanes
    let blockCount = Math.random() < 0.5 ? 2 : 3;

    // shuffle lanes
    laneArray.sort(()=>Math.random()-0.5);

    let blocked = laneArray.slice(0, blockCount);
    let safe = laneArray.slice(blockCount);

    // spawn cars
    blocked.forEach(l=>{
        cars.push({
            lane:l,
            y:-100,
            width:30 + Math.random()*20, // variation
            height:70 + Math.random()*20
        });
    });

    // ✅ coins in safe lanes
    safe.forEach(l=>{
        coinsList.push({
            lane:l,
            y:-120,
            spin:0
        });
    });
}

// 🛣 Road
function drawRoad(){
    ctx.fillStyle="#020617";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    let laneWidth = canvas.width/lanes;

    ctx.strokeStyle="#334155";
    ctx.lineWidth=3;

    for(let i=1;i<lanes;i++){
        let x=i*laneWidth;

        for(let y=-40+roadOffset;y<canvas.height;y+=80){
            ctx.beginPath();
            ctx.moveTo(x,y);
            ctx.lineTo(x,y+40);
            ctx.stroke();
        }
    }
}

// 🚗 Better car style
function drawCar(x,y,w,h,color,tilt=0){

    ctx.save();
    ctx.translate(x,y);
    ctx.rotate(tilt);

    let grad = ctx.createLinearGradient(-w/2,-h/2,w/2,h/2);
    grad.addColorStop(0,"white");
    grad.addColorStop(1,color);

    ctx.shadowBlur=25;
    ctx.shadowColor=color;

    ctx.fillStyle=grad;
    ctx.fillRect(-w/2,-h/2,w,h);

    ctx.restore();
    ctx.shadowBlur=0;
}

// 💰 animated coin
function drawCoin(x,y,spin){

    ctx.save();
    ctx.translate(x,y);
    ctx.rotate(spin);

    ctx.fillStyle="gold";
    ctx.beginPath();
    ctx.arc(0,0,10,0,Math.PI*2);
    ctx.fill();

    ctx.restore();
}

// update
function update(){

    if(gameOver || paused) return;

    score++;
    speed += 0.0007;
    speed = Math.min(speed,13);

    let laneWidth = canvas.width/lanes;

    // smooth movement
    player.targetX = player.lane * laneWidth + laneWidth/2;
    player.x += (player.targetX - player.x)*0.15;

    let px = player.x;
    let py = canvas.height-100;

    // cars
    cars.forEach(car=>{
        car.y += speed;

        let cx = car.lane * laneWidth + laneWidth/2;

        if(Math.abs(cx-px) < 25 && Math.abs(car.y-py) < 45){
            gameOver = true;
            shake = 12;
        }
    });

    // coins
    coinsList.forEach(c=>{
        c.y += speed;
        c.spin += 0.12;

        let cx = c.lane * laneWidth + laneWidth/2;

        if(Math.abs(cx-px)<25 && Math.abs(c.y-py)<45){
            coins++;
            c.collected = true;
        }
    });

    cars = cars.filter(c=>c.y<canvas.height+100);
    coinsList = coinsList.filter(c=>!c.collected && c.y<canvas.height);

    spawnRow();

    roadOffset += speed;
    if(roadOffset>80) roadOffset=0;

    document.getElementById("score").innerText="Score: "+score;
    document.getElementById("coins").innerText="Coins: "+coins;

    if(shake>0) shake--;
}

// draw
function draw(){

    ctx.save();

    if(shake>0){
        ctx.translate(Math.random()*shake - shake/2, Math.random()*shake - shake/2);
    }

    drawRoad();

    let laneWidth = canvas.width/lanes;

    let tilt = (player.targetX - player.x)*0.003;

    drawCar(player.x, canvas.height-100, 35, 80, "#22c55e", tilt);

    cars.forEach(car=>{
        let cx = car.lane*laneWidth + laneWidth/2;
        drawCar(cx, car.y, car.width, car.height, "#ef4444");
    });

    coinsList.forEach(c=>{
        let cx = c.lane*laneWidth + laneWidth/2;
        drawCoin(cx, c.y, c.spin);
    });

    ctx.restore();
}

// loop
function loop(){
    update();
    draw();
    requestAnimationFrame(loop);
}

// controls
document.addEventListener("keydown", e=>{
    if(e.key==="ArrowLeft" && player.lane>0) player.lane--;
    if(e.key==="ArrowRight" && player.lane<lanes-1) player.lane++;
    if(e.key==="Escape") togglePause();
});

// buttons
function togglePause(){
    paused = !paused;
}

function restartGame(){
    init();
}

// start
init();
loop();
</script>

</body>
</html>
