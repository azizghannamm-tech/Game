<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Car Endless Runner</title>

<style>
body{
    margin:0;
    background:#020617;
    color:white;
    font-family:sans-serif;
    overflow:hidden;
}

#ui{
    position:absolute;
    top:10px;
    left:10px;
}

button{
    margin-top:5px;
    padding:6px 12px;
    border:none;
    border-radius:6px;
    background:#3b82f6;
    color:white;
    cursor:pointer;
}

canvas{ display:block; margin:auto; }
</style>
</head>

<body>

<div id="ui">
    <div id="score">Score: 0</div>
    <div id="coins">Coins: 0</div>
    <button onclick="togglePause()">Pause</button>
    <button onclick="restartGame()">Restart</button>
</div>

<canvas id="game" width="400" height="600"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let lanes = 3;
let player, cars, coinsList, speed, score, coins;
let gameOver, paused = false;

let roadOffset = 0;

// init
function init(){
    player = { lane:1, x:0, targetX:0 };
    cars = [];
    coinsList = [];
    speed = 5;
    score = 0;
    coins = 0;
    gameOver = false;
}

// ✅ RANDOM SPAWN SYSTEM
function spawnRow(){

    if(cars.length === 0){
        cars.push({lane:0,y:-100});
        cars.push({lane:2,y:-100});
        coinsList.push({lane:1,y:-120});
        return;
    }

    let highest = Math.min(...cars.map(c=>c.y));
    if(highest > -260) return;

    let pattern = Math.floor(Math.random()*5);

    let used = [];

    switch(pattern){

        // ✅ 2 cars (normal)
        case 0:
            let safeLane = Math.floor(Math.random()*lanes);
            for(let i=0;i<lanes;i++){
                if(i!==safeLane){
                    cars.push({lane:i,y:-100});
                    used.push(i);
                }
            }
            coinsList.push({lane:safeLane,y:-120});
        break;

        // ✅ 1 random car
        case 1:
            let lane = Math.floor(Math.random()*lanes);
            cars.push({lane:lane,y:-100});
            coinsList.push({lane:lane,y:-120});
        break;

        // ✅ 2 adjacent block
        case 2:
            let start = Math.floor(Math.random()*(lanes-1));
            cars.push({lane:start,y:-100});
            cars.push({lane:start+1,y:-100});
            coinsList.push({lane:(3-(start+(start+1))),y:-120});
        break;

        // ✅ random chaos (1–2 cars)
        case 3:
            let count = Math.floor(Math.random()*2)+1;
            for(let i=0;i<count;i++){
                let l = Math.floor(Math.random()*lanes);
                cars.push({lane:l,y:-100});
            }
        break;

        // ✅ empty with coins (reward row)
        case 4:
            let coinLane = Math.floor(Math.random()*lanes);
            coinsList.push({lane:coinLane,y:-120});
        break;
    }
}

// draw road
function drawRoad(){
    ctx.fillStyle="#020617";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    let laneWidth = canvas.width/lanes;

    ctx.strokeStyle="#334155";

    for(let i=1;i<lanes;i++){
        let x=i*laneWidth;

        for(let y=-40+roadOffset;y<canvas.height;y+=80){
            ctx.beginPath();
            ctx.moveTo(x,y);
            ctx.lineTo(x,y+40);
            ctx.stroke();
        }
    }
}

// car
function drawCar(x,y,color){
    ctx.shadowBlur=15;
    ctx.shadowColor=color;

    ctx.fillStyle=color;
    ctx.fillRect(x-20,y-40,40,80);

    ctx.shadowBlur=0;
}

// coin
function drawCoin(x,y){
    ctx.fillStyle="gold";
    ctx.beginPath();
    ctx.arc(x,y,10,0,Math.PI*2);
    ctx.fill();
}

// update
function update(){

    if(gameOver || paused) return;

    score++;
    speed += 0.0008;

    let laneWidth = canvas.width/lanes;

    // smooth movement
    player.targetX = player.lane * laneWidth + laneWidth/2;
    player.x += (player.targetX - player.x)*0.2;

    let px = player.x;
    let py = canvas.height-100;

    // cars
    cars.forEach(car=>{
        car.y+=speed;
        let cx = car.lane*laneWidth + laneWidth/2;

        if(Math.abs(cx-px)<25 && Math.abs(car.y-py)<50){
            gameOver=true;
        }
    });

    // coins
    coinsList.forEach(c=>{
        c.y+=speed;
        let cx = c.lane*laneWidth + laneWidth/2;

        if(Math.abs(cx-px)<25 && Math.abs(c.y-py)<50){
            coins++;
            c.collected=true;
        }
    });

    cars = cars.filter(c=>c.y<canvas.height+100);
    coinsList = coinsList.filter(c=>!c.collected && c.y<canvas.height);

    spawnRow();

    roadOffset += speed;
    if(roadOffset>80) roadOffset=0;

    document.getElementById("score").innerText="Score: "+score;
    document.getElementById("coins").innerText="Coins: "+coins;
}

// draw
function draw(){

    drawRoad();

    let laneWidth = canvas.width/lanes;

    drawCar(player.x, canvas.height-100, "#22c55e");

    cars.forEach(car=>{
        let cx = car.lane*laneWidth + laneWidth/2;
        drawCar(cx, car.y, "#ef4444");
    });

    coinsList.forEach(c=>{
        let cx = c.lane*laneWidth + laneWidth/2;
        drawCoin(cx, c.y);
    });
}

// loop
function loop(){
    update();
    draw();
    requestAnimationFrame(loop);
}

// buttons
function togglePause(){
    paused = !paused;
}

function restartGame(){
    init();
}

// controls
document.addEventListener("keydown", e=>{
    if(e.key==="ArrowLeft" && player.lane>0) player.lane--;
    if(e.key==="ArrowRight" && player.lane<lanes-1) player.lane++;
    if(e.key==="Escape") togglePause();
});

init();
loop();
</script>

</body>
</html>
