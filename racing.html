<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Neon Racing</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:#020617;
    font-family:Segoe UI;
}

#ui{
    position:fixed;
    top:10px;
    width:100%;
    text-align:center;
    color:white;
    z-index:10;
}

#score{
    font-size:22px;
    text-shadow:0 0 10px #0ff;
}

button{
    padding:8px 12px;
    margin:5px;
    border:none;
    border-radius:8px;
    background:#3b82f6;
    color:white;
    cursor:pointer;
}

canvas{
    display:block;
    margin:auto;
    background:#0f172a;
    box-shadow:0 0 30px #00f;
}
</style>
</head>

<body>

<div id="ui">
    <div id="score">Score: 0</div>
    <button onclick="restartGame()">Restart</button>
    <button onclick="goHome()">Home</button>
</div>

<canvas id="game" width="400" height="600"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let lanes = 3;
let player, cars, speed, score, gameOver;

// Init
function init(){
    player = { lane:1 };
    cars = [];
    speed = 5;
    score = 0;
    gameOver = false;
}
init();

// Controls
document.addEventListener("keydown", e=>{
    if(gameOver) return;

    if(e.key==="ArrowLeft" && player.lane>0) player.lane--;
    if(e.key==="ArrowRight" && player.lane<lanes-1) player.lane++;
});

// ✅ SAFE SPAWN SYSTEM
function spawnRow(){
    let safeLane = Math.floor(Math.random()*lanes);

    for(let i=0;i<lanes;i++){
        if(i !== safeLane){
            cars.push({
                lane: i,
                y: -100
            });
        }
    }
}

// Draw road
function drawRoad(){
    ctx.fillStyle="#020617";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.strokeStyle="#334155";
    ctx.lineWidth=3;

    for(let i=1;i<lanes;i++){
        let x = i*canvas.width/lanes;
        ctx.beginPath();
        ctx.moveTo(x,0);
        ctx.lineTo(x,canvas.height);
        ctx.stroke();
    }
}

// Draw car
function drawCar(x,y,color){
    ctx.shadowBlur = 20;
    ctx.shadowColor = color;

    ctx.fillStyle=color;
    ctx.fillRect(x-20,y-40,40,80);

    ctx.shadowBlur = 0;
}

// Update
function update(){

    if(gameOver) return;

    score++;
    speed += 0.002;

    let laneWidth = canvas.width / lanes;
    let px = player.lane * laneWidth + laneWidth/2;
    let py = canvas.height - 100;

    cars.forEach(car=>{
        car.y += speed;

        let cx = car.lane * laneWidth + laneWidth/2;

        if(Math.abs(cx-px)<30 && Math.abs(car.y-py)<60){
            gameOver = true;
            setTimeout(()=>{
                alert("Game Over! Score: " + score);
            },100);
        }
    });

    cars = cars.filter(c=>c.y < canvas.height+100);

    // ✅ spawn rows (guaranteed gap)
    if(Math.random() < 0.04){
        spawnRow();
    }

    document.getElementById("score").innerText = "Score: " + score;
}

// Draw
function draw(){

    drawRoad();

    let laneWidth = canvas.width / lanes;

    let px = player.lane * laneWidth + laneWidth/2;
    drawCar(px, canvas.height-100, "#22c55e");

    cars.forEach(car=>{
        let cx = car.lane * laneWidth + laneWidth/2;
        drawCar(cx, car.y, "#ef4444");
    });
}

// Loop
function loop(){
    update();
    draw();
    requestAnimationFrame(loop);
}

// ✅ Restart button
function restartGame(){
    init();
}

// Home
function goHome(){
    window.location.href="index.html";
}

loop();
</script>

</body>
</html>
``
