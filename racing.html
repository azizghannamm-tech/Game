<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let lanes = 3;
let player, cars, speed, score, gameOver;
let spawnTimer = 0;

// init
function init(){
    player = { lane:1 };
    cars = [];
    speed = 5;
    score = 0;
    gameOver = false;
    spawnTimer = 0;
}
init();

// controls
document.addEventListener("keydown", e=>{
    if(gameOver) return;

    if(e.key==="ArrowLeft" && player.lane>0) player.lane--;
    if(e.key==="ArrowRight" && player.lane<lanes-1) player.lane++;
});

// ✅ NEW SAFE SPAWN SYSTEM
function spawnRow(){

    let safeLane = Math.floor(Math.random()*lanes);
    let laneWidth = canvas.width / lanes;

    // ensure spacing from last row
    let highestCarY = Math.min(...cars.map(c=>c.y), 9999);

    // if too many cars or too close → don't spawn
    if(highestCarY > -250) return;

    for(let i=0;i<lanes;i++){
        if(i !== safeLane){
            cars.push({
                lane: i,
                y: -100
            });
        }
    }
}

// draw road
function drawRoad(){
    ctx.fillStyle="#020617";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.strokeStyle="#334155";
    ctx.lineWidth=3;

    for(let i=1;i<lanes;i++){
        let x = i*canvas.width/lanes;
        ctx.beginPath();
        ctx.moveTo(x,0);
        ctx.lineTo(x,canvas.height);
        ctx.stroke();
    }
}

// draw car
function drawCar(x,y,color){
    ctx.shadowBlur = 20;
    ctx.shadowColor = color;

    ctx.fillStyle=color;
    ctx.fillRect(x-20,y-40,40,80);

    ctx.shadowBlur = 0;
}

// update
function update(){

    if(gameOver) return;

    score++;
    speed += 0.002;

    spawnTimer++;

    let laneWidth = canvas.width / lanes;
    let px = player.lane * laneWidth + laneWidth/2;
    let py = canvas.height - 100;

    // move cars
    cars.forEach(car=>{
        car.y += speed;

        let cx = car.lane * laneWidth + laneWidth/2;

        if(Math.abs(cx-px)<30 && Math.abs(car.y-py)<60){
            gameOver = true;
            setTimeout(()=>{
                alert("Game Over! Score: " + score);
            },100);
        }
    });

    // cleanup
    cars = cars.filter(c => c.y < canvas.height + 100);

    // ✅ CONTROLLED SPAWNING (fix stacking)
    if(spawnTimer > 40){
        spawnRow();
        spawnTimer = 0;
    }

    document.getElementById("score").innerText = "Score: " + score;
}

// draw
function draw(){

    drawRoad();

    let laneWidth = canvas.width / lanes;

    let px = player.lane * laneWidth + laneWidth/2;
    drawCar(px, canvas.height-100, "#22c55e");

    cars.forEach(car=>{
        let cx = car.lane * laneWidth + laneWidth/2;
        drawCar(cx, car.y, "#ef4444");
    });
}

// loop
function loop(){
    update();
    draw();
    requestAnimationFrame(loop);
}

// restart
function restartGame(){
    init();
}

// home
function goHome(){
    window.location.href="index.html";
}

loop();
</script>
