<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Car Endless Runner</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    background:#020617;
    color:white;
    font-family:sans-serif;
    overflow:hidden;
}

canvas{
    display:block;
    margin:auto;
}

#ui{
    position:absolute;
    top:15px;
    left:15px;
    font-size:18px;
}

</style>
</head>

<body>

<div id="ui">
    <div id="score">Score: 0</div>
    <div id="coins">Coins: 0</div>
</div>

<canvas id="game" width="400" height="600"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let lanes = 3;

let player, cars, coinsList, speed, score, gameOver, coins;
let roadOffset = 0;
let lastSafeLane = 1;
let shake = 0;

// sounds
const crashSound = new Audio("https://assets.mixkit.co/active_storage/sfx/2723/2723-preview.mp3");
const coinSound = new Audio("https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3");

// init
function init(){
    player = {
        lane:1,
        x:0,
        targetX:0
    };
    cars = [];
    coinsList = [];
    speed = 5;
    score = 0;
    coins = 0;
    gameOver = false;
    roadOffset = 0;
    shake = 0;
}

// controls
document.addEventListener("keydown", e=>{
    if(gameOver) return;

    if(e.key==="ArrowLeft" && player.lane>0) player.lane--;
    if(e.key==="ArrowRight" && player.lane<lanes-1) player.lane++;
});

// swipe
let touchStart = 0;
canvas.addEventListener("touchstart", e=>{
    touchStart = e.touches[0].clientX;
});
canvas.addEventListener("touchend", e=>{
    let diff = e.changedTouches[0].clientX - touchStart;
    if(Math.abs(diff)>40){
        if(diff<0 && player.lane>0) player.lane--;
        if(diff>0 && player.lane<lanes-1) player.lane++;
    }
});

// spawn
function spawnRow(){

    if(cars.length === 0){
        for(let i=0;i<lanes;i++){
            if(i!==1) cars.push({lane:i,y:-100});
        }
        coinsList.push({lane:1,y:-120,angle:0});
        return;
    }

    let highest = Math.min(...cars.map(c=>c.y));
    if(highest > -260) return;

    let safeLane;
    do{
        safeLane = Math.floor(Math.random()*lanes);
    }while(safeLane===lastSafeLane && Math.random()<0.7);

    lastSafeLane = safeLane;

    for(let i=0;i<lanes;i++){
        if(i!==safeLane) cars.push({lane:i,y:-100});
    }

    coinsList.push({lane:safeLane,y:-120,angle:0});
}

// road
function drawRoad(){
    ctx.fillStyle="#020617";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    let laneWidth = canvas.width/lanes;

    ctx.strokeStyle="#334155";
    ctx.lineWidth=3;

    for(let i=1;i<lanes;i++){
        let x=i*laneWidth;

        for(let y=-40+roadOffset;y<canvas.height;y+=80){
            ctx.beginPath();
            ctx.moveTo(x,y);
            ctx.lineTo(x,y+40);
            ctx.stroke();
        }
    }
}

// fancy car
function drawCar(x,y,color,tilt=0){

    ctx.save();
    ctx.translate(x,y);
    ctx.rotate(tilt);

    let grad = ctx.createLinearGradient(-20,-40,20,40);
    grad.addColorStop(0,"white");
    grad.addColorStop(1,color);

    ctx.shadowBlur=20;
    ctx.shadowColor=color;

    ctx.fillStyle=grad;
    ctx.fillRect(-20,-40,40,80);

    ctx.restore();
    ctx.shadowBlur=0;
}

// coin animation
function drawCoin(x,y,angle){
    ctx.save();
    ctx.translate(x,y);
    ctx.rotate(angle);

    ctx.fillStyle="gold";
    ctx.beginPath();
    ctx.arc(0,0,10,0,Math.PI*2);
    ctx.fill();

    ctx.restore();
}

// update
function update(){

    if(gameOver) return;

    score++;
    speed += 0.0008;
    speed = Math.min(speed,12);

    roadOffset += speed;
    if(roadOffset>80) roadOffset=0;

    let laneWidth = canvas.width/lanes;

    // smooth movement
    player.targetX = player.lane * laneWidth + laneWidth/2;
    player.x += (player.targetX - player.x) * 0.2;

    let px = player.x;
    let py = canvas.height - 100;

    // cars
    cars.forEach(car=>{
        car.y += speed;

        let cx = car.lane * laneWidth + laneWidth/2;

        if(Math.abs(cx-px)<25 && Math.abs(car.y-py)<50){
            crashSound.play();
            gameOver = true;
            shake = 10;

            setTimeout(()=>{
                if(confirm("Game Over!\nScore: "+score)){
                    init();
                }
            },100);
        }
    });

    // coins
    coinsList.forEach(c=>{
        c.y += speed;
        c.angle += 0.1;

        let cx = c.lane * laneWidth + laneWidth/2;

        if(Math.abs(cx-px)<25 && Math.abs(c.y-py)<50){
            coinSound.play();
            coins++;
            c.collected = true;
        }
    });

    cars = cars.filter(c=>c.y < canvas.height+100);
    coinsList = coinsList.filter(c=>!c.collected && c.y<canvas.height);

    spawnRow();

    document.getElementById("score").innerText="Score: "+score;
    document.getElementById("coins").innerText="Coins: "+coins;

    if(shake>0) shake--;
}

// draw
function draw(){

    ctx.save();

    if(shake>0){
        ctx.translate(Math.random()*shake - shake/2, Math.random()*shake - shake/2);
    }

    drawRoad();

    let laneWidth = canvas.width/lanes;

    let tilt = (player.targetX - player.x) * 0.002;
    drawCar(player.x, canvas.height-100, "#22c55e", tilt);

    cars.forEach(car=>{
        let cx = car.lane * laneWidth + laneWidth/2;
        drawCar(cx, car.y, "#ef4444");
    });

    coinsList.forEach(c=>{
        let cx = c.lane * laneWidth + laneWidth/2;
        drawCoin(cx, c.y, c.angle);
    });

    ctx.restore();
}

// loop
function loop(){
    update();
    draw();
    requestAnimationFrame(loop);
}

init();
loop();
</script>

</body>
</html>
