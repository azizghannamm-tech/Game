<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Traffic Runner PRO</title>

<style>
body{
    margin:0;
    background:#020617;
    color:white;
    font-family:sans-serif;
    overflow:hidden;
}

#ui{
    position:absolute;
    top:10px;
    left:10px;
}

button{
    margin-top:5px;
    padding:6px 12px;
    border:none;
    border-radius:6px;
    background:#3b82f6;
    color:white;
    cursor:pointer;
}

canvas{ display:block; margin:auto; }
</style>
</head>

<body>

<div id="ui">
    <div id="score">Score: 0</div>
    <div id="coins">Coins: 0</div>
    <button onclick="togglePause()">Pause</button>
    <button onclick="restartGame()">Restart</button>
</div>

<canvas id="game" width="400" height="600"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let lanes = 4;

let player, cars, coinsList, speed, score, coins;
let gameOver=false, paused=false;
let roadOffset=0;
let shake=0;

const carColors = ["#ef4444","#3b82f6","#22c55e","#f97316","#a855f7"];

// INIT
function init(){
    player = { lane:1, x:0, targetX:0 };
    cars=[];
    coinsList=[];
    speed=5;
    score=0;
    coins=0;
    gameOver=false;
    roadOffset=0;
}

// SPAWN SYSTEM
function spawnRow(){

    if(cars.length === 0){
        for(let i=0;i<4;i++){
            if(i!==1){
                cars.push(createCar(i));
            }
        }
        coinsList.push({lane:1,y:-120,spin:0});
        return;
    }

    let highest = Math.min(...cars.map(c=>c.y));
    if(highest > -260) return;

    let lanesArr=[0,1,2,3];
    lanesArr.sort(()=>Math.random()-0.5);

    let blockCount = Math.random()<0.5 ? 2 : 3;

    let blocked = lanesArr.slice(0,blockCount);
    let safe = lanesArr.slice(blockCount);

    blocked.forEach(l=>cars.push(createCar(l)));

    safe.forEach(l=>{
        coinsList.push({lane:l,y:-120,spin:0});
    });
}

function createCar(lane){
    return {
        lane:lane,
        y:-100,
        width:30 + Math.random()*15,
        height:70 + Math.random()*15,
        color:carColors[Math.floor(Math.random()*carColors.length)],
        speedOffset: Math.random()*1.5,
        changeTimer: 60 + Math.random()*120
    };
}

// ROAD
function drawRoad(){
    ctx.fillStyle="#020617";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    let laneWidth=canvas.width/lanes;

    ctx.strokeStyle="#334155";
    ctx.lineWidth=3;

    for(let i=1;i<lanes;i++){
        let x=i*laneWidth;

        for(let y=-40+roadOffset;y<canvas.height;y+=80){
            ctx.beginPath();
            ctx.moveTo(x,y);
            ctx.lineTo(x,y+40);
            ctx.stroke();
        }
    }
}

// REAL CAR DESIGN
function drawCar(x,y,w,h,color,tilt=0){

    ctx.save();
    ctx.translate(x,y);
    ctx.rotate(tilt);

    ctx.fillStyle=color;
    ctx.fillRect(-w/2,-h/2,w,h);

    // roof
    ctx.fillStyle="#111827";
    ctx.fillRect(-w/4,-h/3,w/2,h/3);

    // windshield
    ctx.fillStyle="#60a5fa";
    ctx.fillRect(-w/4+2,-h/3+4,w/2-4,h/6);

    // rear window
    ctx.fillStyle="#93c5fd";
    ctx.fillRect(-w/4+2,-h/10,w/2-4,h/6);

    // headlights
    ctx.fillStyle="#fef08a";
    ctx.fillRect(-w/2+2,-h/2+5,6,10);
    ctx.fillRect(w/2-8,-h/2+5,6,10);

    // brake lights
    ctx.fillStyle="#ef4444";
    ctx.fillRect(-w/2+2,h/2-15,6,10);
    ctx.fillRect(w/2-8,h/2-15,6,10);

    // wheels
    ctx.fillStyle="black";
    ctx.fillRect(-w/2-2,-h/3,4,12);
    ctx.fillRect(w/2-2,-h/3,4,12);
    ctx.fillRect(-w/2-2,h/6,4,12);
    ctx.fillRect(w/2-2,h/6,4,12);

    ctx.restore();
}

// COIN
function drawCoin(x,y,spin){
    ctx.save();
    ctx.translate(x,y);
    ctx.rotate(spin);

    ctx.fillStyle="gold";
    ctx.beginPath();
    ctx.arc(0,0,10,0,Math.PI*2);
    ctx.fill();

    ctx.restore();
}

// UPDATE
function update(){

    if(gameOver || paused) return;

    score++;
    speed += 0.0007;
    speed = Math.min(speed,13);

    let laneWidth=canvas.width/lanes;

    player.targetX = player.lane * laneWidth + laneWidth/2;
    player.x += (player.targetX - player.x)*0.15;

    let px=player.x;
    let py=canvas.height-100;

    cars.forEach(car=>{

        car.y += speed + car.speedOffset;

        // AI lane change
        car.changeTimer--;
        if(car.changeTimer <= 0){

            let dir = Math.random()<0.5 ? -1 : 1;
            let newLane = car.lane + dir;

            if(newLane>=0 && newLane<lanes){

                let blocked = cars.some(c =>
                    c!==car &&
                    c.lane===newLane &&
                    Math.abs(c.y-car.y)<80
                );

                if(!blocked) car.lane=newLane;
            }

            car.changeTimer = 60 + Math.random()*120;
        }

        let cx = car.lane*laneWidth + laneWidth/2;

        if(Math.abs(cx-px)<25 && Math.abs(car.y-py)<45){
            gameOver=true;
            shake=10;
        }
    });

    coinsList.forEach(c=>{
        c.y += speed;
        c.spin += 0.12;

        let cx = c.lane*laneWidth + laneWidth/2;

        if(Math.abs(cx-px)<25 && Math.abs(c.y-py)<45){
            coins++;
            c.collected=true;
        }
    });

    cars = cars.filter(c=>c.y<canvas.height+100);
    coinsList = coinsList.filter(c=>!c.collected && c.y<canvas.height);

    spawnRow();

    roadOffset += speed;
    if(roadOffset>80) roadOffset=0;

    document.getElementById("score").innerText="Score: "+score;
    document.getElementById("coins").innerText="Coins: "+coins;

    if(shake>0) shake--;
}

// DRAW
function draw(){

    ctx.save();

    if(shake>0){
        ctx.translate(Math.random()*shake - shake/2, Math.random()*shake - shake/2);
    }

    drawRoad();

    let laneWidth=canvas.width/lanes;

    let tilt=(player.targetX-player.x)*0.003;

    drawCar(player.x,canvas.height-100,35,80,"#22c55e",tilt);

    cars.forEach(car=>{
        let cx = car.lane*laneWidth + laneWidth/2;
        drawCar(cx,car.y,car.width,car.height,car.color);
    });

    coinsList.forEach(c=>{
        let cx = c.lane*laneWidth + laneWidth/2;
        drawCoin(cx,c.y,c.spin);
    });

    ctx.restore();
}

// LOOP
function loop(){
    update();
    draw();
    requestAnimationFrame(loop);
}

// CONTROLS
document.addEventListener("keydown",e=>{
    if(e.key==="ArrowLeft" && player.lane>0) player.lane--;
    if(e.key==="ArrowRight" && player.lane<lanes-1) player.lane++;
    if(e.key==="Escape") togglePause();
});

// BUTTONS
function togglePause(){
    paused=!paused;
}

function restartGame(){
    init();
}

// START
init();
loop();
</script>

</body>
</html>
