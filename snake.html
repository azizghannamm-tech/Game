<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Neon Snake</title>

<style>
body{
    margin:0;
    background:#020617;
    overflow:hidden;
}

/* UI */
#ui{
    position:fixed;
    top:10px;
    width:100%;
    text-align:center;
    color:white;
    font-family:Segoe UI;
}

button{
    padding:8px 14px;
    margin:5px;
    border:none;
    border-radius:8px;
    background:#3b82f6;
    color:white;
    cursor:pointer;
}

canvas{
    display:block;
    margin:auto;
    background:#020617;
}
</style>
</head>

<body>

<div id="ui">
    <button onclick="goHome()">⬅ Back to Home</button>
</div>

<canvas id="game" width="400" height="400"></canvas>

<script>
const c = document.getElementById("game");
const ctx = c.getContext("2d");

// 🎵 Background music
const bgMusic = new Audio("https://cdn.pixabay.com/download/audio/2022/03/15/audio_115b9bce37.mp3");
bgMusic.loop = true;
bgMusic.volume = 0.2;

document.addEventListener("click", () => {
    if(bgMusic.paused) bgMusic.play();
});

// 🔊 Eat sound
function beep(freq){
    let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    let osc = audioCtx.createOscillator();
    let gain = audioCtx.createGain();

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    osc.frequency.value = freq;
    gain.gain.value = 0.05;

    osc.start();
    osc.stop(audioCtx.currentTime + 0.1);
}

// Game variables
let snake, food, dx, dy;

// Reset
function init(){
    snake = [{x:200,y:200}];
    food = randFood();
    dx = 20;
    dy = 0;
}

function randFood(){
    return {
        x: Math.floor(Math.random()*20)*20,
        y: Math.floor(Math.random()*20)*20
    };
}

// Controls
document.addEventListener("keydown", e=>{
    if(e.key==="ArrowUp" && dy===0){dx=0;dy=-20;}
    if(e.key==="ArrowDown" && dy===0){dx=0;dy=20;}
    if(e.key==="ArrowLeft" && dx===0){dx=-20;dy=0;}
    if(e.key==="ArrowRight" && dx===0){dx=20;dy=0;}
});

// Neon glow helper
function glow(color){
    ctx.shadowBlur = 20;
    ctx.shadowColor = color;
    ctx.fillStyle = color;
}

// Draw
function draw(){

    // Glow trail effect
    ctx.fillStyle="rgba(2,6,23,0.3)";
    ctx.fillRect(0,0,400,400);

    // Food
    glow("#ff0000");
    ctx.fillRect(food.x,food.y,20,20);

    // Snake (head brighter)
    snake.forEach((segment,index)=>{
        if(index === 0){
            glow("#00ffcc"); // head
        } else {
            glow("#22c55e"); // body
        }
        ctx.fillRect(segment.x,segment.y,20,20);
    });

    ctx.shadowBlur = 0;
}

// Update
function update(){

    let head = {
        x: snake[0].x + dx,
        y: snake[0].y + dy
    };

    // Collision → restart
    if(
        head.x < 0 || head.x >= 400 ||
        head.y < 0 || head.y >= 400 ||
        snake.some(seg => seg.x === head.x && seg.y === head.y)
    ){
        setTimeout(init,200);
        return;
    }

    snake.unshift(head);

    // Eat
    if(head.x === food.x && head.y === food.y){
        beep(600);
        food = randFood();
    } else {
        snake.pop();
    }
}

// Loop
function loop(){
    update();
    draw();
}

setInterval(loop,100);

// Home
function goHome(){
    window.location.href = "index.html";
}

// Start
init();
</script>

</body>
</html>
