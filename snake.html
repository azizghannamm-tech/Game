<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Neon Snake</title>

<style>
body{
    margin:0;
    overflow:hidden;

    /* 🔥 NEW BACKGROUND */
    background:
    radial-gradient(circle at center, #0f172a, #020617 80%);
    
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* UI */
#ui{
    position:fixed;
    top:20px;
    width:100%;
    text-align:center;
    z-index:10;
}

button{
    padding:8px 14px;
    margin:5px;
    border:none;
    border-radius:8px;
    background:#3b82f6;
    color:white;
    cursor:pointer;
}

/* Game wrapper (centers everything cleanly) */
#gameWrapper{
    display:flex;
    flex-direction:column;
    align-items:center;
}

/* Neon border */
canvas{
    background:#020617;

    border:4px solid #38bdf8;

    box-shadow:
        0 0 10px #38bdf8,
        0 0 30px #38bdf8,
        0 0 60px #38bdf8,
        inset 0 0 25px rgba(56,189,248,0.3);
}
</style>
</head>

<body>

<div id="ui">
    <button onclick="goHome()">⬅ Back to Home</button>
</div>

<div id="gameWrapper">
    <canvas id="game"></canvas>
</div>

<script>
const c = document.getElementById("game");
const ctx = c.getContext("2d");

// Resize (perfect square)
function resize(){
    let size = Math.min(window.innerWidth, window.innerHeight) * 0.7;

    size = Math.floor(size / 20) * 20;

    c.width = size;
    c.height = size;
}
window.addEventListener("resize", resize);
resize();

// 🎵 Background music
const bgMusic = new Audio("https://cdn.pixabay.com/download/audio/2022/03/15/audio_115b9bce37.mp3");
bgMusic.loop = true;
bgMusic.volume = 0.2;

document.addEventListener("click", () => {
    if(bgMusic.paused) bgMusic.play();
});

// 🔊 Sound
function beep(freq){
    let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    let osc = audioCtx.createOscillator();
    let gain = audioCtx.createGain();

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    osc.frequency.value = freq;
    gain.gain.value = 0.05;

    osc.start();
    osc.stop(audioCtx.currentTime + 0.1);
}

// Game variables
let snake, food, dx, dy;
let grid = 20;

// Init
function init(){
    snake = [{x:200,y:200}];
    food = randFood();
    dx = grid;
    dy = 0;
}

function randFood(){
    return {
        x: Math.floor(Math.random()*(c.width/grid))*grid,
        y: Math.floor(Math.random()*(c.height/grid))*grid
    };
}

// Controls
document.addEventListener("keydown", e=>{
    if(e.key==="ArrowUp" && dy===0){dx=0;dy=-grid;}
    if(e.key==="ArrowDown" && dy===0){dx=0;dy=grid;}
    if(e.key==="ArrowLeft" && dx===0){dx=-grid;dy=0;}
    if(e.key==="ArrowRight" && dx===0){dx=grid;dy=0;}
});

// Glow
function glow(color){
    ctx.shadowBlur = 20;
    ctx.shadowColor = color;
    ctx.fillStyle = color;
}

// Draw
function draw(){

    ctx.fillStyle="rgba(2,6,23,0.4)";
    ctx.fillRect(0,0,c.width,c.height);

    // Food
    glow("#ef4444");
    ctx.fillRect(food.x,food.y,grid,grid);

    // Snake
    snake.forEach((s,i)=>{
        glow(i===0 ? "#06b6d4" : "#22c55e");
        ctx.fillRect(s.x,s.y,grid,grid);
    });

    ctx.shadowBlur = 0;
}

// Update
function update(){

    let head = {
        x: snake[0].x + dx,
        y: snake[0].y + dy
    };

    if(
        head.x < 0 || head.x >= c.width ||
        head.y < 0 || head.y >= c.height ||
        snake.some(seg => seg.x === head.x && seg.y === head.y)
    ){
        setTimeout(init, 200);
        return;
    }

    snake.unshift(head);

    if(head.x === food.x && head.y === food.y){
        beep(600);
        food = randFood();
    } else {
        snake.pop();
    }
}

// Loop
function loop(){
    update();
    draw();
}

setInterval(loop,100);

// Home button
function goHome(){
    window.location.href="index.html";
}

// Start
init();

</script>

</body>
</html>
