<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zombie Survival</title>

<style>

body{
    margin:0;
    overflow:hidden;
    background:#111827;
    font-family:Arial,sans-serif;
}

#ui{
    position:absolute;
    top:15px;
    left:15px;
    color:white;
    font-size:20px;
    z-index:10;
}

canvas{
    display:block;
}

</style>
</head>

<body>

<div id="ui">
    ❤️ Health: <span id="health">100</span><br>
    🧟 Score: <span id="score">0</span><br>
    🌊 Wave: <span id="wave">1</span>
</div>

<canvas id="game"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const healthEl = document.getElementById("health");
const scoreEl = document.getElementById("score");
const waveEl = document.getElementById("wave");

let mouse = {
    x: canvas.width/2,
    y: canvas.height/2
};

let keys = {};

let score = 0;
let wave = 1;

const player = {
    x: canvas.width/2,
    y: canvas.height/2,
    radius: 20,
    speed: 5,
    health: 100
};

const bullets = [];
const zombies = [];

window.addEventListener("mousemove", e=>{
    mouse.x = e.clientX;
    mouse.y = e.clientY;
});

window.addEventListener("keydown", e=>{
    keys[e.key.toLowerCase()] = true;
});

window.addEventListener("keyup", e=>{
    keys[e.key.toLowerCase()] = false;
});

window.addEventListener("click", ()=>{

    const angle = Math.atan2(
        mouse.y - player.y,
        mouse.x - player.x
    );

    bullets.push({
        x: player.x,
        y: player.y,
        dx: Math.cos(angle)*10,
        dy: Math.sin(angle)*10,
        radius: 5
    });

});

function spawnZombie(){

    const side = Math.floor(Math.random()*4);

    let x,y;

    if(side===0){
        x=-50;
        y=Math.random()*canvas.height;
    }

    if(side===1){
        x=canvas.width+50;
        y=Math.random()*canvas.height;
    }

    if(side===2){
        x=Math.random()*canvas.width;
        y=-50;
    }

    if(side===3){
        x=Math.random()*canvas.width;
        y=canvas.height+50;
    }

    zombies.push({
        x,
        y,
        radius:20,
        speed:1 + wave*0.15
    });
}

let spawnRate = 1500;

setInterval(()=>{
    spawnZombie();
},spawnRate);

function updatePlayer(){

    if(keys["w"]) player.y -= player.speed;
    if(keys["s"]) player.y += player.speed;
    if(keys["a"]) player.x -= player.speed;
    if(keys["d"]) player.x += player.speed;

    player.x = Math.max(
        player.radius,
        Math.min(canvas.width-player.radius,player.x)
    );

    player.y = Math.max(
        player.radius,
        Math.min(canvas.height-player.radius,player.y)
    );
}

function updateBullets(){

    for(let i=bullets.length-1;i>=0;i--){

        const b = bullets[i];

        b.x += b.dx;
        b.y += b.dy;

        if(
            b.x<0||
            b.x>canvas.width||
            b.y<0||
            b.y>canvas.height
        ){
            bullets.splice(i,1);
        }
    }
}

function updateZombies(){

    for(let i=zombies.length-1;i>=0;i--){

        const z = zombies[i];

        const angle = Math.atan2(
            player.y-z.y,
            player.x-z.x
        );

        z.x += Math.cos(angle)*z.speed;
        z.y += Math.sin(angle)*z.speed;

        const distPlayer = Math.hypot(
            player.x-z.x,
            player.y-z.y
        );

        if(distPlayer < player.radius + z.radius){

            player.health -= 0.15;

            if(player.health <= 0){

                alert(
                    "Game Over\nScore: "+score
                );

                location.reload();
            }
        }

        for(let j=bullets.length-1;j>=0;j--){

            const b = bullets[j];

            const dist = Math.hypot(
                b.x-z.x,
                b.y-z.y
            );

            if(dist < z.radius){

                zombies.splice(i,1);
                bullets.splice(j,1);

                score++;

                if(score % 15 === 0){

                    wave++;

                    waveEl.textContent = wave;
                }

                scoreEl.textContent = score;

                break;
            }
        }
    }
}

function drawPlayer(){

    const angle = Math.atan2(
        mouse.y-player.y,
        mouse.x-player.x
    );

    ctx.save();

    ctx.translate(
        player.x,
        player.y
    );

    ctx.rotate(angle);

    ctx.fillStyle="#22c55e";

    ctx.beginPath();
    ctx.arc(
        0,
        0,
        player.radius,
        0,
        Math.PI*2
    );

    ctx.fill();

    ctx.fillStyle="white";

    ctx.fillRect(
        0,
        -4,
        30,
        8
    );

    ctx.restore();
}

function drawBullets(){

    ctx.fillStyle="#facc15";

    bullets.forEach(b=>{

        ctx.beginPath();
        ctx.arc(
            b.x,
            b.y,
            b.radius,
            0,
            Math.PI*2
        );
        ctx.fill();

    });
}

function drawZombies(){

    ctx.fillStyle="#ef4444";

    zombies.forEach(z=>{

        ctx.beginPath();

        ctx.arc(
            z.x,
            z.y,
            z.radius,
            0,
            Math.PI*2
        );

        ctx.fill();

    });
}

function gameLoop(){

    ctx.clearRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    updatePlayer();
    updateBullets();
    updateZombies();

    drawPlayer();
    drawBullets();
    drawZombies();

    healthEl.textContent =
        Math.floor(player.health);

    requestAnimationFrame(
        gameLoop
    );
}

gameLoop();

</script>

</body>
</html>
